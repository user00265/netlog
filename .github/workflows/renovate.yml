name: Renovate

# Self-hosted Renovate: the open-source Renovate CLI runs here on GitHub's free
# hosted runners (NOT a self-hosted runner, and no Mend account) — so it can
# read this repo's Actions secrets and authenticate to the dhi.io registry,
# which lets it propose newer DHI base-image tags. Config lives in renovate.json.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: # allow on-demand runs

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          # A PAT/GitHub App token (RENOVATE_TOKEN) lets Renovate's PRs trigger
          # CI + CodeQL; without one it falls back to GITHUB_TOKEN, whose PRs do
          # not trigger other workflows (GitHub's loop-prevention rule).
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Credentials for the DHI registry so Renovate can list/compare tags.
          # The repo secrets are usable here precisely because this runs inside
          # the repo's own Actions; GitHub masks them in logs.
          RENOVATE_HOST_RULES: >-
            [{"matchHost":"dhi.io","hostType":"docker","username":"${{ secrets.DHI_USERNAME }}","password":"${{ secrets.DHI_TOKEN }}"}]
