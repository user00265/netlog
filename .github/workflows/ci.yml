name: CI

on:
  pull_request:
  push:
    branches: [master, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # The Go packages embed web/dist (//go:embed). The real SPA isn't needed to
      # lint, so a placeholder satisfies the embed and keeps this job fast.
      - name: Stub embedded frontend
        run: |
          mkdir -p web/dist
          printf '<!doctype html><title>ci</title>' > web/dist/index.html

      # v9 (latest) of the action; v7+ supports golangci-lint v2 only.
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  go-test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Stub embedded frontend
        run: |
          mkdir -p web/dist
          printf '<!doctype html><title>ci</title>' > web/dist/index.html

      # Only the unit tests — vet, gofmt, and goimports are already enforced by
      # the golangci-lint job (govet + the gofmt/goimports formatters), so we
      # don't re-run them here.
      - name: go test
        run: go test -race ./...

  frontend:
    name: frontend (lint + check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm lint

      - name: Type check (svelte-check)
        run: pnpm check

      - name: Build SPA
        run: pnpm build
