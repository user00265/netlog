name: Testing image

# Publishes a bleeding-edge `:testing` image to ghcr.io whenever the `testing`
# tag is (force-)moved onto a commit:
#
#   git tag -f testing && git push -f origin testing
#
# GoReleaser builds the snapshot binary (running the same `just build-web` /
# `just check` pre-hooks as a release), then the binary is packaged into the
# DHI-based image and pushed as `:testing`. It is linux/amd64 only — stable
# multi-arch images come from tagged releases (see release.yml).
on:
  push:
    tags:
      - testing

permissions:
  contents: read
  packages: write

concurrency:
  group: testing-image
  cancel-in-progress: true

jobs:
  testing:
    name: snapshot → :testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install golangci-lint
        # Fetch the installer from the pinned release tag, not HEAD, so the
        # script piped into the shell can't be changed out from under us.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Needed to pull the DHI runtime base while building the image.
      - name: Log in to the Docker Hardened Images registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      # Build the snapshot binary (host platform = linux/amd64) through
      # GoReleaser so it runs the build-web + check pre-hooks and stamps the
      # version the same way a release does.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean --single-target

      # Stage the binary in the per-platform layout the Dockerfile expects
      # ($TARGETPLATFORM/netlog), matching what GoReleaser's dockers_v2 produces
      # for release images. This build is linux/amd64 only.
      - name: Stage build context
        run: |
          mkdir -p build-context/linux/amd64
          cp "$(find dist -type f -name netlog | head -n1)" build-context/linux/amd64/netlog

      - name: Build and push :testing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: build-context
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/user00265/netlog:testing
