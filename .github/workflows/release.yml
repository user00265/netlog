name: Release

# Stable releases are cut by pushing a semver tag, e.g. `git tag v1.2.3 && git
# push origin v1.2.3`. GoReleaser then builds the binaries + archives, publishes
# the multi-arch container image to ghcr.io, and drafts the GitHub release.
on:
  push:
    tags:
      - "v*.*.*"

# A release needs to create the GitHub release (contents) and push images to the
# GitHub Container Registry (packages).
permissions:
  contents: write
  packages: write

jobs:
  release:
    name: goreleaser release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog.

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # The SPA is built by the `just build-web` GoReleaser pre-hook and embedded
      # into the binary, so the frontend toolchain has to be present.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # `just check` (a GoReleaser pre-hook) runs golangci-lint as the verify
      # gate, so both `just` and the linter must be installed.
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install golangci-lint
        # Fetch the installer from the pinned release tag, not HEAD, so the
        # script piped into the shell can't be changed out from under us.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The image's runtime base is pulled from the Docker Hardened Images
      # registry, which requires authentication. Add DHI_USERNAME / DHI_TOKEN
      # repository secrets (a free Docker account + access token).
      - name: Log in to the Docker Hardened Images registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
